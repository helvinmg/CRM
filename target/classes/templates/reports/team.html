<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Team Performance Report - CRM Pro</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <h5 class="mb-0 fw-bold">Team Performance Report</h5>
        </div>
        <div class="glass-card">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Team Member</th>
                        <th>Assigned Leads</th>
                        <th>Assigned Tasks</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="entry : ${reportData}">
                        <td class="fw-bold" th:text="${entry['userName']}">User Name</td>
                        <td th:text="${entry['leadsAssigned']}">Leads Count</td>
                        <td th:text="${entry['tasksAssigned']}">Tasks Count</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reportData)}">
                        <td colspan="3" class="text-center text-muted py-4">No data available.</td>
                    </tr>
                </tbody>
            </table>
                </div>
                <div class="col-md-6 p-4">
                    <canvas id="teamChart"></canvas>
                </div>
            </div>
            <a href="/reports" class="btn btn-light mt-3">Back to Reports</a>
        </div>
    </div>
    <th:block layout:fragment="scripts">
        <script th:inline="javascript">
            /*<![CDATA[*/
            document.addEventListener('DOMContentLoaded', function() {
                const data = /*[[${reportData}]]*/ [];
                const ctx = document.getElementById('teamChart');
                if (ctx && data.length > 0) {
                    const labels = data.map(d => d.userName);
                    const leads = data.map(d => d.leadsAssigned);
                    const tasks = data.map(d => d.tasksAssigned);

                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: 'Leads',
                                    data: leads,
                                    backgroundColor: '#0d6efd'
                                },
                                {
                                    label: 'Tasks',
                                    data: tasks,
                                    backgroundColor: '#ffc107'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }
            });
            /*]]>*/
        </script>
    </th:block>
</body>
</html>
