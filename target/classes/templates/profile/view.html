<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>My Profile - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-primary text-white d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 80px; height: 80px; font-size: 2rem;">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <h4 class="mt-3 fw-bold">My Profile</h4>
                        <p class="text-muted">Manage your personal information</p>
                    </div>

                    <form th:action="@{/profile}" method="post">
                        
                        <div class="mb-4">
                            <label for="email" class="form-label text-muted small fw-bold">Email Address (Read Only)</label>
                            <input type="email" class="form-control bg-light text-muted" id="email" name="email" th:value="${user.email}" readonly>
                        </div>

                        <div class="mb-4">
                            <label for="fullName" class="form-label text-muted small fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="fullName" name="fullName" th:value="${user.fullName}" required>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2"><i class="fa-solid fa-save me-2"></i> Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
