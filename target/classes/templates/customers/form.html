<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Customer Form - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{${customer.customerId == null ? '/customers/new' : '/customers/' + customer.customerId + '/edit'}}" th:object="${customer}" method="post">
                <input type="hidden" th:field="*{customerId}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">FULL NAME <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{customerName}" th:errorclass="is-invalid" required>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}"></div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">COMPANY NAME</label>
                    <input type="text" class="form-control" th:field="*{companyName}">
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">EMAIL ADDRESS</label>
                        <input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">PHONE NUMBER</label>
                        <input type="text" class="form-control" th:field="*{phone}">
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/customers" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
