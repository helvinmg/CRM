<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Customer Detail - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row g-4">
            <!-- Customer Info Sidebar -->
            <div class="col-md-4">
                <div class="glass-card text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold mx-auto mb-3" style="width: 80px; height: 80px; font-size: 2rem;" th:text="${#strings.substring(customer.customerName,0,1)}">
                        A
                    </div>
                    <h4 class="fw-bold mb-1" th:text="${customer.customerName}">Name</h4>
                    <p class="text-muted mb-3" th:text="${customer.companyName}">Company</p>
                    
                    <div class="d-flex justify-content-center gap-2">
                        <a th:href="@{/customers/{id}/edit(id=${customer.customerId})}" class="btn btn-outline-primary btn-sm"><i class="fa-solid fa-edit me-1"></i> Edit</a>
                        <a href="mailto:email@example.com" th:href="@{mailto:{email}(email=${customer.email})}" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-envelope me-1"></i> Email</a>
                    </div>
                </div>

                <div class="glass-card">
                    <h6 class="fw-bold text-muted small mb-3">CONTACT INFORMATION</h6>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3 d-flex align-items-start gap-3">
                            <i class="fa-solid fa-envelope text-primary mt-1"></i>
                            <div>
                                <span class="d-block text-muted small fw-bold">Email</span>
                                <span th:text="${customer.email ?: 'N/A'}">email</span>
                            </div>
                        </li>
                        <li class="d-flex align-items-start gap-3">
                            <i class="fa-solid fa-phone text-primary mt-1"></i>
                            <div>
                                <span class="d-block text-muted small fw-bold">Phone</span>
                                <span th:text="${customer.phone ?: 'N/A'}">phone</span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Customer Activities -->
            <div class="col-md-8">
                <div class="glass-card h-100">
                    <ul class="nav nav-tabs mb-4" id="customerTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" id="leads-tab" data-bs-toggle="tab" data-bs-target="#leads" type="button" role="tab">Leads</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="interactions-tab" data-bs-toggle="tab" data-bs-target="#interactions" type="button" role="tab">Interactions</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold" id="tasks-tab" data-bs-toggle="tab" data-bs-target="#tasks" type="button" role="tab">Tasks</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="customerTabsContent">
                        <div class="tab-pane fade show active" id="leads" role="tabpanel">
                            <div class="text-end mb-3">
                                <a th:href="@{/leads/new}" class="btn btn-sm btn-primary"><i class="fa-solid fa-plus me-1"></i> Add Lead</a>
                            </div>
                            <div th:if="${#lists.isEmpty(leads)}" class="text-muted text-center py-5">No leads attached yet.</div>
                            <ul class="list-group list-group-flush" th:if="${not #lists.isEmpty(leads)}">
                                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="lead : ${leads}">
                                    <a th:href="@{/leads/{id}(id=${lead.leadId})}" class="text-decoration-none fw-bold" th:text="${'Lead #' + lead.leadId + ' - ' + lead.status}">Lead</a>
                                    <span class="badge bg-primary rounded-pill" th:text="${lead.status}">Status</span>
                                </li>
                            </ul>
                        </div>
                        <div class="tab-pane fade" id="interactions" role="tabpanel">
                            <div th:if="${#lists.isEmpty(interactions)}" class="text-muted text-center py-5">No interactions logged yet.</div>
                            <ul class="list-group list-group-flush" th:if="${not #lists.isEmpty(interactions)}">
                                <li class="list-group-item" th:each="interaction : ${interactions}">
                                    <h6 class="mb-1 fw-bold" th:text="${interaction.subject}">Subject</h6>
                                    <small class="text-muted d-block" th:text="${#temporals.format(interaction.interactionDate, 'MMM dd, yyyy')}">Date</small>
                                </li>
                            </ul>
                        </div>
                        <div class="tab-pane fade" id="tasks" role="tabpanel">
                            <div th:if="${#lists.isEmpty(tasks)}" class="text-muted text-center py-5">No active tasks.</div>
                            <ul class="list-group list-group-flush" th:if="${not #lists.isEmpty(tasks)}">
                                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="task : ${tasks}">
                                    <div>
                                        <h6 class="mb-1 fw-bold" th:text="${task.title}">Title</h6>
                                        <small class="text-muted" th:text="${'Due: ' + task.dueDate}">Date</small>
                                    </div>
                                    <span class="badge bg-warning text-dark" th:text="${task.status}">Status</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
