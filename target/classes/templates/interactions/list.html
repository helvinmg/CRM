<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Interactions - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-muted">All Interactions</h5>
            </div>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Lead ID</th>
                            <th>Type</th>
                            <th>Subject</th>
                            <th>User</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="interaction : ${interactions}">
                            <td class="fw-bold" th:text="${#temporals.format(interaction.interactionDate, 'MMM dd, yyyy')}">Date</td>
                            <td><a th:href="@{/leads/{id}(id=${interaction.leadId})}" class="text-primary text-decoration-none">Lead #<span th:text="${interaction.leadId}">ID</span></a></td>
                            <td>
                                <span class="badge bg-primary" th:text="${interaction.interactionType}">Type</span>
                            </td>
                            <td th:text="${interaction.subject}">Subject</td>
                            <td th:text="${interaction.userName}">User</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(interactions)}">
                            <td colspan="5" class="text-center text-muted py-4">No interactions logged yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
