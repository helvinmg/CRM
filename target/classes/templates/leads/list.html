<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Leads - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div class="btn-group">
                    <a th:href="@{/leads(view='table')}" class="btn btn-outline-primary" th:classappend="${viewMode == 'table'} ? 'active'">
                        <i class="fa-solid fa-list me-1"></i> Table
                    </a>
                    <a th:href="@{/leads(view='kanban')}" class="btn btn-outline-primary" th:classappend="${viewMode == 'kanban'} ? 'active'">
                        <i class="fa-solid fa-columns me-1"></i> Kanban
                    </a>
                </div>
                <a href="/leads/new" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Add Lead</a>
            </div>
        </div>

        <!-- Table View -->
        <div th:if="${viewMode == 'table'}" class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Deal Title</th>
                            <th>Customer</th>
                            <th>Assigned To</th>
                            <th>Expected Close</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="lead : ${leads}">
                            <td class="fw-bold"><a th:href="@{/leads/{id}(id=${lead.leadId})}" class="text-dark text-decoration-none" th:text="${lead.title}">Deal Title</a></td>
                            <td th:text="${lead.customerName}">Customer Name</td>
                            <td th:text="${lead.assignedUserName}">User</td>
                            <td th:text="${#temporals.format(lead.expectedCloseDate, 'MMM dd, yyyy')}">Date</td>
                            <td>
                                <span class="badge" 
                                      th:classappend="${'bg-status-' + #strings.toLowerCase(lead.status)}"
                                      th:text="${lead.status}">STATUS</span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/leads/{id}(id=${lead.leadId})}" class="btn btn-sm btn-light text-primary"><i class="fa-solid fa-eye"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Kanban View (Basic Mock) -->
        <div th:if="${viewMode == 'kanban'}" class="row flex-nowrap overflow-auto pb-3 px-2">
            <div class="col-3" th:each="status : ${statuses}">
                <div class="glass-card p-3 bg-light h-100">
                    <h6 class="fw-bold mb-3 pb-2 border-bottom text-muted" th:text="${status}">STATUS</h6>
                    
                    <div th:each="lead : ${leads}" th:if="${lead.status == status}" class="card border-0 shadow-sm mb-2 rounded-3">
                        <div class="card-body p-3">
                            <h6 class="fw-bold mb-1"><a th:href="@{/leads/{id}(id=${lead.leadId})}" class="text-dark text-decoration-none" th:text="${lead.title}">Deal Title</a></h6>
                            <p class="text-muted small mb-1"><i class="fa-solid fa-building me-1"></i> <span th:text="${lead.customerName}">Customer</span></p>
                            <p class="text-muted small mb-2"><i class="fa-solid fa-user me-1"></i> <span th:text="${lead.assignedUserName}">Agent</span></p>
                            <span class="badge" th:classappend="${'bg-status-' + #strings.toLowerCase(lead.status)}" th:text="${lead.status}">STATUS</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
