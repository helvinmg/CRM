<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Lead Details - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <!-- Pipeline Progress Bar -->
        <div class="glass-card mb-4 p-4">
            <h4 class="fw-bold mb-4" th:text="${lead.title + ' (' + lead.customerName + ')'}">Lead</h4>
            <div class="d-flex justify-content-between position-relative">
                <div class="position-absolute top-50 start-0 w-100 bg-light" style="height: 4px; z-index: 1;"></div>
                <div class="position-absolute top-50 start-0 bg-primary" style="height: 4px; z-index: 2; width: 50%;"></div> <!-- Width should be dynamic based on status index -->
                
                <div class="position-relative text-center" style="z-index: 3;" th:each="s : ${statuses}">
                    <div class="rounded-circle d-flex align-items-center justify-content-center mx-auto mb-2 border border-3"
                         th:classappend="${lead.status == s ? 'bg-primary border-primary text-white' : 'bg-white border-light text-muted'}"
                         style="width: 40px; height: 40px;">
                        <i class="fa-solid fa-check" th:if="${lead.status == s}"></i>
                        <span th:unless="${lead.status == s}" th:text="${sStat.index + 1}"></span>
                    </div>
                    <span class="small fw-bold text-muted d-block" th:text="${s}">STATUS</span>
                </div>
            </div>
            
            <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                <div>
                    <span class="text-muted small fw-bold me-2">CURRENT STATUS:</span>
                    <span class="badge fs-6" th:classappend="${'bg-status-' + #strings.toLowerCase(lead.status)}" th:text="${lead.status}">STATUS</span>
                </div>
                <form th:action="@{/leads/{id}/status(id=${lead.leadId})}" method="post" class="d-flex gap-2">
                    <select name="status" class="form-select form-select-sm" style="width: auto;">
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == lead.status}"></option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-primary">Update Phase</button>
                </form>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="glass-card mb-4">
                    <h6 class="fw-bold text-muted small mb-3">LEAD DETAILS</h6>
                    <ul class="list-unstyled mb-0">
                        <li class="mb-3">
                            <span class="d-block text-muted small fw-bold">Assigned Agent</span>
                            <span th:text="${lead.assignedUserName ?: 'Unassigned'}">Agent</span>
                        </li>
                        <li class="mb-3">
                            <span class="d-block text-muted small fw-bold">Source</span>
                            <span th:text="${lead.source ?: 'N/A'}">Source</span>
                        </li>
                        <li>
                            <span class="d-block text-muted small fw-bold">Expected Close Date</span>
                            <span th:text="${lead.expectedCloseDate != null ? #temporals.format(lead.expectedCloseDate, 'MMM dd, yyyy') : 'N/A'}">Date</span>
                        </li>
                    </ul>
                </div>
                
                <div class="glass-card h-100">
                    <h6 class="fw-bold text-muted small mb-3">STATUS HISTORY (AUDIT LOG)</h6>
                    <div th:if="${#lists.isEmpty(history)}" class="text-center text-muted py-4">No history logged yet.</div>
                    <div class="timeline position-relative" th:if="${not #lists.isEmpty(history)}">
                        <div class="border-start border-2 ms-2 ps-3 py-2 position-relative" th:each="hist : ${history}">
                            <div class="position-absolute bg-primary rounded-circle" style="width: 10px; height: 10px; left: -6px; top: 15px;"></div>
                            <div class="mb-1">
                                <span class="badge bg-secondary me-1" th:text="${hist.oldStatus}">OLD</span>
                                <i class="fa-solid fa-arrow-right text-muted small"></i>
                                <span class="badge bg-primary ms-1" th:text="${hist.newStatus}">NEW</span>
                            </div>
                            <small class="text-muted d-block" th:text="${'By ' + hist.changedBy.fullName + ' on ' + #temporals.format(hist.changeDate, 'MMM dd, yyyy HH:mm')}"></small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="glass-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold text-muted small mb-0">RECENT INTERACTIONS</h6>
                        <a th:href="@{/interactions/new(leadId=${lead.leadId})}" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-plus me-1"></i> Log Interaction</a>
                    </div>
                    <div th:if="${#lists.isEmpty(interactions)}" class="text-center text-muted py-4">No interactions logged yet.</div>
                    <div th:if="${not #lists.isEmpty(interactions)}" class="list-group list-group-flush">
                        <div class="list-group-item px-0 py-3" th:each="interaction : ${interactions}">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1 fw-bold" th:text="${interaction.subject}">Subject</h6>
                                <small class="text-muted" th:text="${#temporals.format(interaction.interactionDate, 'MMM dd, yyyy')}">Date</small>
                            </div>
                            <p class="mb-1 small" th:text="${interaction.notes}">Notes</p>
                            <small class="text-primary fw-bold" th:text="${interaction.interactionType}">Type</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
