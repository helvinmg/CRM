<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Tasks - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">All Tasks</h5>
                <a href="/tasks/new" class="btn btn-primary"><i class="fa-solid fa-plus me-2"></i>Add Task</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Priority</th>
                            <th>Due Date</th>
                            <th>Assigned To</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="task : ${tasks}">
                            <td class="fw-bold" th:text="${task.title}">Title</td>
                            <td>
                                <span class="badge" th:classappend="${task.priority == 'HIGH' ? 'bg-danger' : (task.priority == 'MEDIUM' ? 'bg-warning' : 'bg-success')}" th:text="${task.priority}">PRIORITY</span>
                            </td>
                            <td th:text="${#temporals.format(task.dueDate, 'MMM dd, yyyy')}">Date</td>
                            <td th:text="${task.assignedUserName}">User</td>
                            <td>
                                <span class="badge bg-secondary" th:if="${task.status == 'PENDING'}">PENDING</span>
                                <span class="badge bg-primary" th:if="${task.status == 'IN_PROGRESS'}">IN PROGRESS</span>
                                <span class="badge bg-success" th:if="${task.status == 'COMPLETED'}">COMPLETED</span>
                            </td>
                            <td class="text-end">
                                <form th:action="@{/tasks/{id}/status(id=${task.taskId})}" method="post" class="d-inline">
                                    <select name="status" class="form-select form-select-sm d-inline-block w-auto" onchange="this.form.submit()">
                                        <option value="PENDING" th:selected="${task.status == 'PENDING'}">PENDING</option>
                                        <option value="IN_PROGRESS" th:selected="${task.status == 'IN_PROGRESS'}">IN PROGRESS</option>
                                        <option value="COMPLETED" th:selected="${task.status == 'COMPLETED'}">COMPLETED</option>
                                    </select>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
