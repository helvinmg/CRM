<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Lead Form - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/leads/new}" th:object="${lead}" method="post">
                
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">DEAL TITLE <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="e.g. Q3 Software License" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">CUSTOMER <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{customerId}" required>
                        <option value="">Select Customer...</option>
                        <option th:each="c : ${customers}" th:value="${c.customerId}" th:text="${c.customerName}"></option>
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">ASSIGNED TO</label>
                        <select class="form-select" th:field="*{assignedTo}">
                            <option value="">Select Agent...</option>
                            <option th:each="u : ${users}" th:value="${u.userId}" th:text="${u.fullName}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">LEAD STATUS</label>
                        <select class="form-select" th:field="*{status}">
                            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">SOURCE</label>
                        <input type="text" class="form-control" th:field="*{source}" placeholder="e.g. Website, Referral">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">EXPECTED CLOSE DATE</label>
                        <input type="date" class="form-control" th:field="*{expectedCloseDate}">
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/leads" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Lead</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
