<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Create User - CRM Pro</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <h5 class="mb-0 fw-bold">Create New User</h5>
        </div>

        <div class="glass-card">
            <form th:action="@{/admin/users/new}" th:object="${user}" method="post">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="fullName" class="form-label fw-bold">Full Name</label>
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label fw-bold">Email Address</label>
                        <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="role" class="form-label fw-bold">Role</label>
                        <select class="form-select" id="role" th:field="*{role}" required>
                            <option value="">Select Role...</option>
                            <option th:each="roleOpt : ${roles}" th:value="${roleOpt}" th:text="${roleOpt}">Role</option>
                        </select>
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <p class="text-muted small mb-0"><i class="fa-solid fa-info-circle me-1"></i> A random secure password will be automatically generated and displayed upon creation.</p>
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-2"></i>Create User</button>
                    <a href="/admin/users" class="btn btn-light">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
