<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>User Management - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">User Accounts</h5>
                <a href="/admin/users/new" class="btn btn-primary"><i class="fa-solid fa-user-plus me-2"></i>Create User</a>
            </div>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="fw-bold">
                                <div class="d-flex align-items-center gap-2">
                                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                                        <i class="fa-solid fa-user"></i>
                                    </div>
                                    <span th:text="${user.fullName}">Name</span>
                                </div>
                            </td>
                            <td th:text="${user.email}">Email</td>
                            <td><span class="badge bg-secondary" th:text="${user.role}">ROLE</span></td>
                            <td>
                                <span class="badge" th:classappend="${user.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}" th:text="${user.status}">STATUS</span>
                            </td>
                            <td class="text-end">
                                <form th:if="${user.status == 'ACTIVE'}" th:action="@{/admin/users/{id}/deactivate(id=${user.userId})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-light text-danger" title="Deactivate" onclick="return confirm('Are you sure you want to deactivate this user?')"><i class="fa-solid fa-ban"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
