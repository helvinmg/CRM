<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Reports - CRM Pro</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="glass-card text-center py-5 h-100">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px;">
                        <i class="fa-solid fa-chart-line fa-2x"></i>
                    </div>
                    <h5 class="fw-bold">Sales Pipeline</h5>
                    <p class="text-muted small mb-4">View lead distribution across different stages.</p>
                    <a href="/reports/sales" class="btn btn-outline-primary">Generate Report</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card text-center py-5 h-100">
                    <div class="bg-warning bg-opacity-10 text-warning rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px;">
                        <i class="fa-solid fa-tasks fa-2x"></i>
                    </div>
                    <h5 class="fw-bold">Task Activity</h5>
                    <p class="text-muted small mb-4">Analyze task completion and overdue metrics.</p>
                    <a href="/reports/tasks" class="btn btn-outline-warning">Generate Report</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card text-center py-5 h-100">
                    <div class="bg-success bg-opacity-10 text-success rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 60px; height: 60px;">
                        <i class="fa-solid fa-users fa-2x"></i>
                    </div>
                    <h5 class="fw-bold">Team Performance</h5>
                    <p class="text-muted small mb-4">Measure agent effectiveness and closed deals.</p>
                    <a href="/reports/team" class="btn btn-outline-success">Generate Report</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
