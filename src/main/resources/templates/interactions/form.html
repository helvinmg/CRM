<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Log Interaction - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/interactions/new}" th:object="${interaction}" method="post">
                <input type="hidden" th:field="*{leadId}">
                
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">INTERACTION TYPE</label>
                    <select class="form-select" th:field="*{interactionType}" required>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">SUBJECT</label>
                    <input type="text" class="form-control" th:field="*{subject}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">DATE</label>
                    <input type="date" class="form-control" th:field="*{interactionDate}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">NOTES</label>
                    <textarea class="form-control" th:field="*{notes}" rows="4"></textarea>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/leads/{id}(id=*{leadId})}" class="btn btn-light">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Interaction</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
