<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/crm.css}">
</head>
<body>

    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="/dashboard" class="brand">
            <i class="fa-solid fa-bolt text-warning me-2"></i> Flow
        </a>
        <div class="mt-4">
            <a href="/dashboard" class="nav-link" th:classappend="${requestURI == '/dashboard' ? 'active' : ''}">
                <i class="fa-solid fa-chart-pie fa-fw"></i> Dashboard
            </a>
            <a href="/customers" class="nav-link" th:classappend="${#strings.startsWith(requestURI, '/customers') ? 'active' : ''}">
                <i class="fa-solid fa-users fa-fw"></i> Customers
            </a>
            <a href="/leads" class="nav-link" th:classappend="${#strings.startsWith(requestURI, '/leads') ? 'active' : ''}">
                <i class="fa-solid fa-funnel-dollar fa-fw"></i> Leads & Pipeline
            </a>
            <a href="/interactions" class="nav-link" th:classappend="${#strings.startsWith(requestURI, '/interactions') ? 'active' : ''}">
                <i class="fa-solid fa-comments fa-fw"></i> Interactions
            </a>
            <a href="/tasks" class="nav-link" th:classappend="${#strings.startsWith(requestURI, '/tasks') ? 'active' : ''}">
                <i class="fa-solid fa-tasks fa-fw"></i> Tasks
            </a>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/reports" class="nav-link" th:classappend="${requestURI == '/reports' ? 'active' : ''}">
                    <i class="fa-solid fa-chart-bar fa-fw"></i> Reports
                </a>
                <a href="/admin/users" class="nav-link" th:classappend="${#strings.startsWith(requestURI, '/admin/users') ? 'active' : ''}">
                    <i class="fa-solid fa-user-cog fa-fw"></i> User Management
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div class="d-flex align-items-center">
                <!-- Mobile toggle could go here -->
                <h5 class="mb-0 text-muted" th:text="${pageTitle ?: 'Dashboard'}">Page Title</h5>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 border-0 bg-transparent" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 35px; height: 35px;">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <span sec:authentication="name" class="fw-medium">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="userDropdown">
                        <li>
                            <a class="dropdown-item" href="/profile">
                                <i class="fa-solid fa-id-card me-2 text-muted"></i> Profile
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="/profile/reset-password">
                                <i class="fa-solid fa-key me-2 text-muted"></i> Reset Password
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="fa-solid fa-sign-out-alt me-2"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="p-4 flex-grow-1" style="background-color: #F8FAFC;">
            
            <!-- Flash Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-check-circle me-2"></i>
                <span th:text="${successMessage}">Success!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fa-solid fa-exclamation-circle me-2"></i>
                <span th:text="${errorMessage}">Error!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div layout:fragment="content">
                <!-- Page specific content goes here -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script>
        // Register datalabels globally for all charts
        Chart.register(ChartDataLabels);
        Chart.defaults.set('plugins.datalabels', {
            color: '#fff',
            font: { weight: 'bold' },
            display: function(context) {
                return context.dataset.data[context.dataIndex] > 0; // only show if > 0
            }
        });
    </script>
    <script th:src="@{/js/crm.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
