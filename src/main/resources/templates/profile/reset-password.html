<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Reset Password - Flow</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="glass-card p-5">
                    <div class="text-center mb-4">
                        <div class="rounded-circle bg-warning text-dark d-inline-flex align-items-center justify-content-center shadow-sm" style="width: 80px; height: 80px; font-size: 2rem;">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <h4 class="mt-3 fw-bold">Reset Password</h4>
                        <p class="text-muted">Choose a strong, secure password</p>
                    </div>

                    <form th:action="@{/profile/reset-password}" method="post">
                        
                        <div class="mb-4">
                            <label for="newPassword" class="form-label text-muted small fw-bold">New Password</label>
                            <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label text-muted small fw-bold">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="6">
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-warning py-2 fw-bold"><i class="fa-solid fa-lock me-2"></i> Update Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
